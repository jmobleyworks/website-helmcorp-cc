name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT_NAME=$(basename $(pwd) | sed 's/website-//')
          echo "Deploying $PROJECT_NAME to Cloudflare Pages..."

          # Create tarball from src/ directory
          cd src
          tar --exclude='.git' --exclude='node_modules' -czf ../deployment.tar.gz .
          cd ..

          # Upload tarball to Cloudflare Pages using the deployment API
          # The API expects the tarball as binary form data with field name "manifest"
          curl -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments" \
            -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" \
            -H "X-Auth-Key: ${CLOUDFLARE_API_KEY}" \
            -F "manifest=@deployment.tar.gz" \
            -F "branch=main" \
            -v

          echo "Deployment request sent for $PROJECT_NAME"
