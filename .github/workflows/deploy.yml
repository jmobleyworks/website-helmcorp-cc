name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        run: |
          PROJECT_NAME=$(basename $(pwd) | sed 's/website-//')
          echo "Deploying $PROJECT_NAME..."

          # Create tarball of src directory for deployment
          cd src
          tar -czf ../deployment.tar.gz .
          cd ..

          # Deploy to Cloudflare Pages
          curl -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/${PROJECT_NAME}/deployments" \
            -H "X-Auth-Email: ${{ secrets.CLOUDFLARE_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CLOUDFLARE_API_KEY }}" \
            -F "manifest=@deployment.tar.gz" \
            -F "branch=main"

          echo "Deployment submitted to https://${PROJECT_NAME}.pages.dev"
