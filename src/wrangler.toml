################################################################################
# MASCOM Hydra - Unified Wrangler Configuration
# Three Workers: getdomains, getventures, mascom-hydra
# Account: f07be5f84583d0d100b05aeeae56870b
################################################################################

################################################################################
# PRIMARY WORKER: mascom-hydra (Functional Orchestrator)
################################################################################

name = "mascom-hydra"
main = "worker-functional.js"
compatibility_date = "2025-05-11"
account_id = "f07be5f84583d0d100b05aeeae56870b"

# Route patterns for Hydra edge projection
routes = [
	{ pattern = "*.mobleysoft.com/*", zone_name = "mobleysoft.com" },
	{ pattern = "*.helmcorp.cc/*", zone_name = "helmcorp.cc" },
	{ pattern = "stream.filmline.cc/*", zone_name = "filmline.cc" },
	{ pattern = "hal.halside.com/*", zone_name = "halside.com" },
]

# D1 Database Binding (Primary)
# Using existing mascom-core database (account reached D1 limit)
[[d1_databases]]
binding = "HYDRA_DB"
database_name = "mascom-core"
database_id = "a737193b-f898-497f-9fe5-ec39d464f0bf"

# Environment variables
[vars]
MASCOM_SECRET = ""  # Set via: wrangler secret put MASCOM_SECRET
LOG_LEVEL = "info"

# Triggers for scheduled tasks (optional)
[triggers]
crons = ["0 */6 * * *"]  # Sync every 6 hours

################################################################################
# SECONDARY WORKER: getdomains
################################################################################

[env.getdomains]
name = "getdomains"
main = "getdomains-worker.js"
routes = [
	{ pattern = "getdomains.johnmobley99.workers.dev/*" },
]

[[env.getdomains.d1_databases]]
binding = "HYDRA_DB"
database_name = "mascom-core"
database_id = "a737193b-f898-497f-9fe5-ec39d464f0bf"

[env.getdomains.vars]
LOG_LEVEL = "info"

################################################################################
# TERTIARY WORKER: getventures
################################################################################

[env.getventures]
name = "getventures"
main = "getventures-worker.js"
routes = [
	{ pattern = "getventures.johnmobley99.workers.dev/*" },
]

[[env.getventures.d1_databases]]
binding = "HYDRA_DB"
database_name = "mascom-core"
database_id = "a737193b-f898-497f-9fe5-ec39d464f0bf"

[env.getventures.vars]
LOG_LEVEL = "info"

################################################################################
# BUILD CONFIGURATION
################################################################################

# No custom build - use module format directly

################################################################################
# ENVIRONMENT: production
################################################################################

[env.production]
name = "mascom-hydra-prod"
routes = [
	{ pattern = "*.mobleysoft.com/*", zone_name = "mobleysoft.com" },
	{ pattern = "*.helmcorp.cc/*", zone_name = "helmcorp.cc" },
	{ pattern = "stream.filmline.cc/*", zone_name = "filmline.cc" },
	{ pattern = "hal.halside.com/*", zone_name = "halside.com" },
]

[[env.production.d1_databases]]
binding = "HYDRA_DB"
database_name = "mascom-core"
database_id = "a737193b-f898-497f-9fe5-ec39d464f0bf"

[env.production.vars]
LOG_LEVEL = "warn"

################################################################################
# ENVIRONMENT: staging
################################################################################

[env.staging]
name = "mascom-hydra-staging"
routes = [
	{ pattern = "*.staging.mobleysoft.com/*", zone_name = "mobleysoft.com" },
]

[[env.staging.d1_databases]]
binding = "HYDRA_DB"
database_name = "mascom-core"
database_id = "a737193b-f898-497f-9fe5-ec39d464f0bf"

[env.staging.vars]
LOG_LEVEL = "debug"

################################################################################
# ENVIRONMENT: test
################################################################################

[env.test]
name = "mascom-hydra-test"
main = "worker-functional.js"
routes = [
	{ pattern = "test.hydra.local/*" },
]

[[env.test.d1_databases]]
binding = "HYDRA_DB"
database_name = "mascom-core"
database_id = "a737193b-f898-497f-9fe5-ec39d464f0bf"

[env.test.vars]
LOG_LEVEL = "debug"

################################################################################
# DEPLOYMENT NOTES
################################################################################

# Deploy all three workers:
#   wrangler deploy --name mascom-hydra
#   wrangler deploy --name getdomains --env getdomains
#   wrangler deploy --name getventures --env getventures
#
# View deployments:
#   wrangler deployments list
#   wrangler deployments list --name getdomains
#   wrangler deployments list --name getventures
#
# View logs:
#   wrangler tail mascom-hydra
#   wrangler tail getdomains
#   wrangler tail getventures
#
# Set secrets:
#   wrangler secret put MASCOM_SECRET (for mascom-hydra only)
#
# Test locally:
#   wrangler dev
#
# Database operations:
#   wrangler d1 execute hydra_db --file schema.sql
#   wrangler d1 list
#   wrangler d1 info hydra_db
